services:
  - type: web
    name: mooniq-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: X_BEARER_TOKEN
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: LUNARCRUSH_API_KEY
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
